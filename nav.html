<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>打开门店导航｜一帘温馨窗帘软装生活馆</title>
  <style>
    :root {
      color-scheme: light;
      --green: #1f6f4a;
      --blue: #2563eb;
      --ink: #10231c;
      --muted: #63756c;
      --line: #d9e2dc;
      --paper: #fffdfa;
      --soft: #f5f2eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--soft);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(92vw, 540px);
      padding: 28px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 20px 50px rgb(34 56 44 / 12%);
    }

    .mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      margin-bottom: 18px;
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(26px, 8vw, 36px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 16px;
    }

    .address {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin: 18px 0;
      color: var(--ink);
      background: #fff;
      font-weight: 700;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    a,
    button {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .primary {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .baidu {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .secondary {
      background: #fff;
      color: var(--ink);
    }

    .hint {
      margin-top: 18px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">帘</div>
    <h1>打开门店导航</h1>
    <p>目的地已设置好。优先用高德，也可以用百度地图。</p>
    <div class="address">
      一帘温馨窗帘软装生活馆（淮滨县正义街店）<br />
      河南省信阳市淮滨县正义街288号（水利局西侧）<br />
      高德坐标：115.412650, 32.460211
    </div>
    <div class="actions">
      <a class="primary" id="openAmapApp" href="#">打开高德地图 App</a>
      <a class="baidu" id="openBaiduApp" href="#">打开百度地图 App</a>
      <a class="secondary" id="openAmapWeb" href="#">高德网页路线</a>
      <a class="secondary" id="openBaiduWeb" href="#">百度网页路线</a>
      <button class="secondary" id="copyAddress" type="button">复制门店名称</button>
    </div>
    <p class="hint">微信、抖音、QQ 浏览器有时会拦截 App 跳转。没反应时，用 Safari 或手机自带浏览器打开本页再点。</p>
  </main>

  <script>
    (function () {
      const lon = "115.412650";
      const lat = "32.460211";
      const name = "一帘温馨窗帘软装生活馆（淮滨县正义街店）";
      const address = "河南省信阳市淮滨县正义街288号（水利局西侧）";
      const encodedName = encodeURIComponent(name);
      const encodedAddress = encodeURIComponent(address);
      const baiduDestination = encodeURIComponent(`latlng:${lat},${lon}|name:${name}`);

      const urls = {
        amapIos: `iosamap://path?sourceApplication=yunlian-curtain&dlat=${lat}&dlon=${lon}&dname=${encodedName}&dev=0&t=0`,
        amapAndroid: `amapuri://route/plan/?sourceApplication=yunlian-curtain&dlat=${lat}&dlon=${lon}&dname=${encodedName}&dev=0&t=0`,
        amapWeb: `https://uri.amap.com/route?dlon=${lon}&dlat=${lat}&dname=${encodedName}&t=0&callnative=1`,
        baiduApp: `baidumap://map/navi?location=${lat},${lon}&query=${encodedName}&coord_type=gcj02&src=webapp.yunlian.curtain`,
        baiduWeb: `https://api.map.baidu.com/direction?destination=${baiduDestination}&mode=driving&coord_type=gcj02&region=${encodeURIComponent("淮滨县")}&output=html&src=webapp.yunlian.curtain`,
      };

      const ua = navigator.userAgent || "";
      const isIos = /iPhone|iPad|iPod/i.test(ua);
      const amapApp = isIos ? urls.amapIos : urls.amapAndroid;

      function wire(id, url) {
        const link = document.getElementById(id);
        if (!link) return;
        link.href = url;
        link.addEventListener("click", function (event) {
          event.preventDefault();
          window.location.href = url;
        });
      }

      wire("openAmapApp", amapApp);
      wire("openBaiduApp", urls.baiduApp);
      wire("openAmapWeb", urls.amapWeb);
      wire("openBaiduWeb", urls.baiduWeb);

      const copyAddress = document.getElementById("copyAddress");
      copyAddress.addEventListener("click", async function () {
        try {
          await navigator.clipboard.writeText(`${name} ${address}`);
          copyAddress.textContent = "已复制";
        } catch {
          copyAddress.textContent = `${name} ${address}`;
        }
      });
    })();
  </script>
</body>
</html>
